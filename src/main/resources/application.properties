# Server
server.port=${PORT:8080}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Supabase
supabase.url=${SUPABASE_URL}
supabase.key=${SUPABASE_KEY}
supabase.bucket=social-media

# File Upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# App
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}

# Email sender branding
# From address shown to recipients (Gmail SMTP sends on their behalf)
app.mail.display-name=${APP_MAIL_DISPLAY_NAME:FriendsHub}
app.mail.from-address=${APP_MAIL_FROM:noreply@friendshub.me}
app.mail.reply-to=${APP_MAIL_REPLY_TO:support@friendshub.me}

# Verification and reset link base URLs (no trailing slash)
app.verification-url=${APP_VERIFICATION_URL:https://friendshub.me/verify}
app.reset-password-url=${APP_RESET_PASSWORD_URL:https://friendshub.me/reset-password}

# Rate Limiting
app.ratelimit.requests-per-minute=60
app.ratelimit.per-user.requests-per-minute=30
app.ratelimit.global.requests-per-minute=1000

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Error handling
server.error.include-stacktrace=never
server.error.include-message=never

# Resilience4j
resilience4j.circuitbreaker.instances.chatService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.chatService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.chatService.waitDurationInOpenState=10s
resilience4j.circuitbreaker.instances.notificationService.slidingWindowSize=10
resilience4j.circuitbreaker.instances.notificationService.failureRateThreshold=50
resilience4j.circuitbreaker.instances.notificationService.waitDurationInOpenState=10s

# Logging
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# =====================================================
# PERFORMANCE: Enable Gzip compression
# Reduces JSON response size on mobile and slow connections
# =====================================================
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain,text/css,application/javascript
server.compression.min-response-size=1024

# =====================================================
# PERFORMANCE: HikariCP connection pool tuning
# Default pool size (10) causes connection starvation under load
# =====================================================
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.leak-detection-threshold=60000

# =====================================================
# SECURITY: Never show stack traces in API error responses
# =====================================================
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# =====================================================
# SECURITY: Prevent oversized request bodies from
# crashing or DoS-ing the server
# =====================================================
server.tomcat.max-swallow-size=2097152
server.tomcat.max-http-form-post-size=2097152

# =====================================================
# REDIS CONFIG (Upstash Redis for prod, localhost for local)
# =====================================================
spring.data.redis.url=${REDIS_URL:redis://localhost:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2000}
spring.data.redis.lettuce.pool.max-active=${REDIS_POOL_MAX_ACTIVE:10}
spring.data.redis.lettuce.pool.max-idle=${REDIS_POOL_MAX_IDLE:5}
spring.data.redis.lettuce.pool.min-idle=${REDIS_POOL_MIN_IDLE:2}
spring.data.redis.lettuce.pool.max-wait=${REDIS_POOL_MAX_WAIT:-1}

# =====================================================
# CACHE CONFIG (Redis-backed)
# =====================================================
spring.cache.type=redis
spring.cache.redis.time-to-live=300000

# =====================================================
# KAFKA CONFIG (Upstash Kafka for prod, localhost for local)
# =====================================================
spring.kafka.bootstrap-servers=${KAFKA_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=friendshub-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.socialmedia.entity,com.example.socialmedia.dto.kafka
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Upstash Kafka SASL config (only active when env vars are set)
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM:}
spring.kafka.properties.sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}

# Fix Redis/JPA repository scanning conflict
spring.data.redis.repositories.enabled=false

